name: CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "configs/**"
      - "docker/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t fraud-detection-api:${{ github.sha }} .
          docker tag fraud-detection-api:${{ github.sha }} fraud-detection-api:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/fraud-detection-api
          docker tag fraud-detection-api:latest $IMAGE:${{ github.sha }}
          docker tag fraud-detection-api:latest $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
