experiment_name: "fraud-detection"
model_name: "fraud-detector"

logistic_regression:
  max_iter: 1000
  class_weight: "balanced"
  solver: "lbfgs"
  random_state: 42

xgboost:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  eval_metric: "aucpr"
  use_label_encoder: false

split:
  test_size: 0.15
  val_size: 0.15
  random_state: 42

promotion:
  threshold: 0.02  # Promote if PR-AUC improves by at least 2%
